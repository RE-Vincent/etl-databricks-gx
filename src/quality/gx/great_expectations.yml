config_version: 3.0

# 1. DÓNDE ESTÁN TUS REGLAS (Expectations)
stores:
  expectations_store:
    class_name: ExpectationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: expectations/  # Relativo a la carpeta /gx del repo

  # 2. DÓNDE SE GUARDAN LOS JSON DE RESULTADOS (Validations) - AQUÍ VA TU HISTÓRICO
  validations_store:
    class_name: ValidationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: /dbfs/gx/results/  # Ruta persistente en Databricks

  # 3. DÓNDE SE GUARDAN LOS CHECKPOINTS
  checkpoint_store:
    class_name: CheckpointStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: checkpoints/

# 4. CONFIGURACIÓN DEL REPORTE VISUAL (Data Docs)
data_docs_sites:
  local_site:
    class_name: SiteBuilder
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: /dbfs/gx/static/data_docs/ # Ruta persistente para ver el HTML
    site_index_builder:
      class_name: DefaultSiteIndexBuilder

# 5. MOTOR DE DATOS (Datasource)
fluent_datasources:
  my_spark_datasource:
    type: spark